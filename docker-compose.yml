services:
  app:
    build: .
    container_name: crm-app
    restart: always
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      # - DATABASE_URL=postgres://user:password@db:5432/mydb
      # - GEMINI_API_KEY=your_gemini_api_key
      # - JWT_SECRET=your_jwt_secret
    env_file:
      - .env
