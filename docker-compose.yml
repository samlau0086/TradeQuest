services:
  app:
    build: .
    container_name: crm-app
    restart: always
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - KNOWLEDGE_IMPORT_DIR=/app/rag-import
      # - DATABASE_URL=postgres://user:password@db:5432/mydb
      # - GEMINI_API_KEY=your_gemini_api_key
      # - JWT_SECRET=your_jwt_secret
    volumes:
      - /opt/ai-crm/rag-import:/app/rag-import
    env_file:
      - .env
