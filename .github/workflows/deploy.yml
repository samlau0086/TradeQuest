name: Deploy to VPS

on:
  push:
    branches:
      - main # Trigger on push to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment env file
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          printf 'DATABASE_URL=%s\n' "$DATABASE_URL" > .env
          printf 'GEMINI_API_KEY=%s\n' "$GEMINI_API_KEY" >> .env
          printf 'JWT_SECRET=%s\n' "$JWT_SECRET" >> .env

      - name: Copy repository and deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_PRIVATE_KEY: ${{ secrets.VPS_PRIVATE_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          set -Eeuo pipefail
          trap 'echo "::error::Deployment failed at line $LINENO while running: $BASH_COMMAND"' ERR

          if [ -z "${VPS_HOST:-}" ] || [ -z "${VPS_USERNAME:-}" ] || [ -z "${VPS_PRIVATE_KEY:-}" ]; then
            echo "::error::Missing one of VPS_HOST, VPS_USERNAME, or VPS_PRIVATE_KEY secrets."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_OPTS="-i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=30"
          DEPLOY_TARGET="/opt/1panel/www/sites/ai-crm"

          echo "Testing SSH connection..."
          ssh $SSH_OPTS "$VPS_USERNAME@$VPS_HOST" "whoami && mkdir -p '$DEPLOY_TARGET' && test -w '$DEPLOY_TARGET'"

          echo "Syncing files to VPS..."
          rsync --version | head -n 1

          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            -e "ssh $SSH_OPTS" \
            ./ "$VPS_USERNAME@$VPS_HOST:$DEPLOY_TARGET/"

          echo "Rebuilding containers..."
          ssh $SSH_OPTS "$VPS_USERNAME@$VPS_HOST" "DEPLOY_TARGET='$DEPLOY_TARGET' bash -s" <<'REMOTE_DEPLOY'
          set -Eeuo pipefail
          cd "$DEPLOY_TARGET"
          docker compose version

          echo "Building image before replacing the running container..."
          if ! docker compose build; then
            echo "::warning::Initial Docker build failed. Cleaning Docker builder cache and retrying without cache."
            docker builder prune -af || true
            docker buildx prune -af || true
            docker image prune -f || true
            docker compose build --no-cache
          fi

          echo "Starting updated containers..."
          docker compose up -d --remove-orphans
          docker image prune -f || true
          REMOTE_DEPLOY
