name: Deploy to VPS

on:
  push:
    branches:
      - main # Trigger on push to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment env file
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          printf 'DATABASE_URL=%s\n' "$DATABASE_URL" > .env
          printf 'GEMINI_API_KEY=%s\n' "$GEMINI_API_KEY" >> .env
          printf 'JWT_SECRET=%s\n' "$JWT_SECRET" >> .env

      - name: Copy repository and deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_PRIVATE_KEY: ${{ secrets.VPS_PRIVATE_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL || 'http://127.0.0.1:3003/api/healthz' }}
        run: |
          set -Eeuo pipefail
          trap 'echo "::error::Deployment failed at line $LINENO while running: $BASH_COMMAND"' ERR

          if [ -z "${VPS_HOST:-}" ] || [ -z "${VPS_USERNAME:-}" ] || [ -z "${VPS_PRIVATE_KEY:-}" ]; then
            echo "::error::Missing one of VPS_HOST, VPS_USERNAME, or VPS_PRIVATE_KEY secrets."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_OPTS="-i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=30"
          DEPLOY_TARGET="/opt/1panel/www/sites/ai-crm"
          RAG_IMPORT_DIR="/opt/ai-crm/rag-import"

          echo "Testing SSH connection..."
          ssh $SSH_OPTS "$VPS_USERNAME@$VPS_HOST" "whoami && mkdir -p '$DEPLOY_TARGET' '$RAG_IMPORT_DIR' && test -w '$DEPLOY_TARGET' && test -w '$RAG_IMPORT_DIR'"

          echo "Syncing files to VPS..."
          rsync --version | head -n 1

          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            -e "ssh $SSH_OPTS" \
            ./ "$VPS_USERNAME@$VPS_HOST:$DEPLOY_TARGET/"

          echo "Rebuilding containers..."
          ssh $SSH_OPTS "$VPS_USERNAME@$VPS_HOST" "DEPLOY_TARGET='$DEPLOY_TARGET' RAG_IMPORT_DIR='$RAG_IMPORT_DIR' HEALTHCHECK_URL='$HEALTHCHECK_URL' bash -s" <<'REMOTE_DEPLOY'
          set -Eeuo pipefail
          mkdir -p "$RAG_IMPORT_DIR"
          cd "$DEPLOY_TARGET"
          docker compose version

          BASE_IMAGE="node:22-alpine"

          check_docker_hub_access() {
            echo "Checking Docker Hub access for $BASE_IMAGE..."
            for attempt in 1 2 3; do
              if getent hosts registry-1.docker.io >/dev/null 2>&1 && docker pull "$BASE_IMAGE"; then
                echo "Docker Hub access is healthy."
                return 0
              fi
              echo "::warning::Docker Hub check failed on attempt $attempt. Retrying in 5 seconds..."
              sleep 5
            done
            return 1
          }

          try_repair_dns() {
            echo "::warning::VPS cannot resolve or reach Docker Hub. Attempting DNS repair when passwordless sudo is available."
            if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null && command -v resolvectl >/dev/null 2>&1; then
              DEFAULT_IFACE="$(ip route | awk '/default/ {print $5; exit}')"
              if [ -n "$DEFAULT_IFACE" ]; then
                sudo resolvectl dns "$DEFAULT_IFACE" 1.1.1.1 8.8.8.8 || true
                sudo resolvectl domain "$DEFAULT_IFACE" '~.' || true
                sudo systemctl restart docker || true
              fi
            fi
          }

          if ! check_docker_hub_access; then
            try_repair_dns
            if ! check_docker_hub_access; then
              echo "::error::The VPS cannot resolve or reach Docker Hub (registry-1.docker.io), so Docker cannot load node:22-alpine."
              echo "This is a VPS DNS/network issue, not an application build error."
              echo "Recommended fix on the VPS:"
              echo "  sudo resolvectl status"
              echo "  ip route | awk '/default/ {print \$5; exit}'"
              echo "  sudo resolvectl dns <default-interface> 1.1.1.1 8.8.8.8"
              echo "  sudo resolvectl domain <default-interface> '~.'"
              echo "  sudo systemctl restart docker"
              echo "  docker pull node:22-alpine"
              echo "If your server provider blocks Docker Hub, configure a Docker registry mirror on the VPS and rerun this workflow."
              exit 1
            fi
          fi

          echo "Building image before replacing the running container..."
          if ! docker compose build; then
            echo "::warning::Initial Docker build failed. Verifying registry access before cache cleanup."
            if ! check_docker_hub_access; then
              echo "::error::Docker Hub became unavailable after the preflight check. Keeping the current running container unchanged."
              exit 1
            fi
            echo "::warning::Cleaning Docker builder cache and retrying without cache."
            docker builder prune -af || true
            docker buildx prune -af || true
            docker image prune -f || true
            docker compose build --no-cache
          fi

          echo "Starting updated containers..."
          docker compose up -d --remove-orphans

          echo "Waiting for application health check..."
          for attempt in $(seq 1 30); do
            if curl -fsS "$HEALTHCHECK_URL" >/tmp/ai-crm-healthz.json; then
              echo "Health check passed on attempt $attempt."
              cat /tmp/ai-crm-healthz.json
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "::error::Health check failed after $attempt attempts: $HEALTHCHECK_URL"
              docker compose ps
              docker compose logs --tail=120
              exit 1
            fi

            sleep 5
          done

          docker image prune -f || true
          REMOTE_DEPLOY
